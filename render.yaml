# Blueprint cho Render - dùng "New +" → "Blueprint" và chọn repo này,
# Render sẽ tự đọc file này để tạo Web Service đúng cấu hình.
# Các giá trị "sync: false" cần bạn tự điền trong Render Dashboard
# (không lưu secret trong file này / trong Git).
services:
  - type: web
    name: gemini-telegram-bot
    runtime: python
    region: singapore  # Gần Việt Nam nhất (oregon/ohio/virginia/frankfurt/singapore)
    plan: free
    numInstances: 1  # BẮT BUỘC = 1: call_lock và GeminiClient singleton trong
                      # gemini_client.py chỉ tồn tại trong 1 process. Nếu
                      # service này bị scale ngang lên >1 instance, 2 process
                      # độc lập sẽ gọi đồng thời lên cùng 1 cookie Google -
                      # đúng điều assumption "serialize mọi request" muốn tránh.
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn web:api --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: ALLOWED_USER_ID
        sync: false
      - key: GEMINI_SECURE_1PSID
        sync: false
      - key: GEMINI_SECURE_1PSIDTS
        sync: false
      - key: GALLERY_CHANNEL_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
